<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            position: absolute;
        }
        .satu{
            top: 100px;
            left: 100px;
             z-index: 2;
        }
        .dua{
            top: 200px;
            left: 200px;
            z-index: 3;
        }
        .tiga{
            top: 300px;
            left: 300px;
            z-index: 4;
        }
        img{
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <div class="satu">
        <img src="lizard3.jpeg">
    </div>
    <div class="dua">
        <img src="lizard2.jpeg">
    </div>
    <div class="tiga">
        <img src="lizard1.jpeg">
    </div>
</body>
</html>
