<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>praktik-12.z-index4</title>
<style>
        div{
            width: 200px;
            height: 200px;
            position: absolute;
        }
        .satu{
            background-color: navy;
            z-index: 1;
        }
        .dua{
            background-color: teal;
            top: 100px;
            left: 100px;
        }
        .tiga{
            background-color: skyblue;
            top: 200px;
            left: 200px;

        }
    </style>
</head>
<body>
    <div class="satu"></div>
    <div class="dua"></div>
    <div class="tiga"></div>
</body>
</html>
